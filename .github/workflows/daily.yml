name: Daily Screener

on:
  schedule:
    - cron: "15 6 * * 1-5"   # 06:15 UTC = ca. 08:15 Oslo (CEST) / 07:15 Oslo (CET)
  workflow_dispatch:

concurrency:
  group: daily-screener-main
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Run screener
        env:
          YF_PAUSE: "0.40"
        run: python screener.py

      - name: Verify latest.csv
        run: |
          python - <<'PY'
          import csv
          import sys
          from pathlib import Path

          path = Path("latest.csv")
          if not path.exists():
              sys.exit("latest.csv was not created")

          lines = path.read_text(encoding="utf-8").splitlines()
          if not lines or not lines[0].startswith("# oslo-screener"):
              sys.exit("latest.csv is missing the oslo-screener metadata header")
          if "generated_at=" not in lines[0]:
              sys.exit("latest.csv metadata is missing generated_at")

          data_lines = [line for line in lines if not line.startswith("#")]
          rows = list(csv.DictReader(data_lines))
          if not rows:
              sys.exit("latest.csv has no data rows")
          required = {"ticker", "date", "close", "rsi14", "signal"}
          missing = required.difference(rows[0])
          if missing:
              sys.exit(f"latest.csv is missing required columns: {sorted(missing)}")

          print(f"latest.csv verified with {len(rows)} rows")
          PY

      - name: Build daily report
        continue-on-error: true
        run: python scripts/build_report.py

      - name: Commit latest.csv and reports to main
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.csv summaries/*.md buy.csv sell.csv watch_buy.csv watch_sell.csv signals_only.csv || true
          git commit -m "daily: latest.csv + dagsrapport [skip ci]" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push origin HEAD:main

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screener-and-summary
          path: |
            latest.csv
            summaries/*.md
            report_*.csv

      - name: Prepare site content
        run: |
          mkdir -p site
          cp latest.csv site/latest.csv
          cat <<'HTML' > site/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>Oslo Screener latest.csv</title>
          </head>
          <body>
            <main>
              <h1>Oslo Screener Reports</h1>
              <p><a href="latest.csv">Download the freshest latest.csv report</a>.</p>
            </main>
          </body>
          </html>
          HTML

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger dashboard refresh when token is configured
        env:
          DASHBOARD_WORKFLOW_TOKEN: ${{ secrets.DASHBOARD_WORKFLOW_TOKEN }}
        run: |
          if [ -z "${DASHBOARD_WORKFLOW_TOKEN:-}" ]; then
            echo "DASHBOARD_WORKFLOW_TOKEN is not configured; dashboard will refresh on its schedule."
            exit 0
          fi
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DASHBOARD_WORKFLOW_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/keresell-coder/oslo-screener-dashboard/actions/workflows/daily.yml/dispatches \
            -d '{"ref":"main"}'
